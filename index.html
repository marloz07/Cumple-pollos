<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso restringido</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:black; color:white;">

<h2>Introduce la contraseña</h2>

<input type="password" id="pass" style="padding:10px;">
<button onclick="check()" style="padding:10px;">Entrar</button>

<div id="video" style="display:none; margin-top:20px;">
  <iframe width="560" height="315" 
  src="https://drive.google.com/file/d/1fFN6HEmxdAZnBHeHe33qRsgf6-1QQTJX/preview" 
  frameborder="0" allowfullscreen></iframe>
</div>

<script>
function check() {
  var p = document.getElementById("pass").value;

  if(p === "2996") {
    document.getElementById("video").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
}
</script>

</body>
</html>
