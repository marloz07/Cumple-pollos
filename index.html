<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cumple Pollos</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:black; color:white;">

<h2>Introduce la contraseña</h2>

<input type="password" id="pass" style="padding:10px;">
<button onclick="check()" style="padding:10px;">Entrar</button>

<script>
function check() {
  var p = document.getElementById("pass").value;

  if(p === "2996") {
    document.getElementById("video").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
}
</script>

</body>
</html>
